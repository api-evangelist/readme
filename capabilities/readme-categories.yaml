naftiko: 1.0.0-alpha2
info:
  label: ReadMe API — Categories
  description: 'ReadMe API — Categories. 5 operations. Lead operation: List categories. Self-contained Naftiko capability
    covering one Readme business surface.'
  tags:
  - Readme
  - Categories
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    README_API_KEY: README_API_KEY
capability:
  consumes:
  - type: http
    namespace: readme-categories
    baseUri: https://api.readme.com/v2
    description: ReadMe API — Categories business capability. Self-contained, no shared references.
    resources:
    - name: categories
      path: /categories
      operations:
      - name: get
        method: GET
        description: List categories
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: post
        method: POST
        description: Create a category
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: categories-slug
      path: /categories/{slug}
      operations:
      - name: get
        method: GET
        description: Get a category
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: slug
          in: path
          type: string
          required: true
      - name: put
        method: PUT
        description: Update a category
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: slug
          in: path
          type: string
          required: true
      - name: delete
        method: DELETE
        description: Delete a category
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: slug
          in: path
          type: string
          required: true
    authentication:
      type: bearer
      token: '{{env.README_API_KEY}}'
  exposes:
  - type: rest
    namespace: readme-categories-rest
    port: 8080
    description: REST adapter for ReadMe API — Categories. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/categories
      name: categories
      description: REST surface for categories.
      operations:
      - method: GET
        name: get
        description: List categories
        call: readme-categories.get
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: post
        description: Create a category
        call: readme-categories.post
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/categories/{slug}
      name: categories-slug
      description: REST surface for categories-slug.
      operations:
      - method: GET
        name: get
        description: Get a category
        call: readme-categories.get
        with:
          slug: rest.slug
        outputParameters:
        - type: object
          mapping: $.
      - method: PUT
        name: put
        description: Update a category
        call: readme-categories.put
        with:
          slug: rest.slug
        outputParameters:
        - type: object
          mapping: $.
      - method: DELETE
        name: delete
        description: Delete a category
        call: readme-categories.delete
        with:
          slug: rest.slug
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: readme-categories-mcp
    port: 9090
    transport: http
    description: MCP adapter for ReadMe API — Categories. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: list-categories
      description: List categories
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: readme-categories.get
      outputParameters:
      - type: object
        mapping: $.
    - name: create-category
      description: Create a category
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: readme-categories.post
      outputParameters:
      - type: object
        mapping: $.
    - name: get-category
      description: Get a category
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: readme-categories.get
      with:
        slug: tools.slug
      outputParameters:
      - type: object
        mapping: $.
    - name: update-category
      description: Update a category
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: readme-categories.put
      with:
        slug: tools.slug
      outputParameters:
      - type: object
        mapping: $.
    - name: delete-category
      description: Delete a category
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: readme-categories.delete
      with:
        slug: tools.slug
      outputParameters:
      - type: object
        mapping: $.
