naftiko: 1.0.0-alpha2
info:
  label: ReadMe Developer Metrics API — Metrics
  description: 'ReadMe Developer Metrics API — Metrics. 1 operations. Lead operation: Submit API request logs. Self-contained
    Naftiko capability covering one Readme business surface.'
  tags:
  - Readme
  - Metrics
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    README_API_KEY: README_API_KEY
capability:
  consumes:
  - type: http
    namespace: developer-metrics-metrics
    baseUri: https://metrics.readme.io/v1
    description: ReadMe Developer Metrics API — Metrics business capability. Self-contained, no shared references.
    resources:
    - name: request
      path: /request
      operations:
      - name: post
        method: POST
        description: Submit API request logs
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: basic
      username: '{{env.README_USER}}'
      password: '{{env.README_PASS}}'
  exposes:
  - type: rest
    namespace: developer-metrics-metrics-rest
    port: 8080
    description: REST adapter for ReadMe Developer Metrics API — Metrics. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/request
      name: request
      description: REST surface for request.
      operations:
      - method: POST
        name: post
        description: Submit API request logs
        call: developer-metrics-metrics.post
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: developer-metrics-metrics-mcp
    port: 9090
    transport: http
    description: MCP adapter for ReadMe Developer Metrics API — Metrics. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: submit-api-request-logs
      description: Submit API request logs
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: developer-metrics-metrics.post
      outputParameters:
      - type: object
        mapping: $.
