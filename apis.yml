apis:
  - aid: readme:readme-api
    name: ReadMe API
    tags:
      - API
      - Documentation
    humanURL: https://docs.readme.com/main/reference/intro-to-the-readme-api
    baseURL: https://dash.readme.io/api/v1
    properties:
      - url: https://docs.readme.com/main/reference/intro-to-the-readme-api
        type: Documentation
      - url: https://docs.readme.com/main/reference/intro/authentication
        type: Authentication
    description: >-
      The ReadMe API lets you programmatically control your ReadMe developer hub.
      You can manage API definitions, API reference pages, guides, changelogs,
      custom pages, categories, branches, images, recipes, and search. It uses
      HTTP Basic authentication with your project API key.
  - aid: readme:developer-metrics-api
    name: ReadMe Developer Metrics API
    tags:
      - Analytics
      - Metrics
    humanURL: https://readme.com/developer-dashboard
    properties:
      - url: https://readme.com/developer-dashboard
        type: Documentation
    description: >-
      The ReadMe Developer Metrics API provides endpoints for sending API logs
      and retrieving analytics data including page quality scores, page view
      statistics, and search analytics. It powers the Developer Dashboard where
      you can investigate API usage by key or email and debug requests in
      real time.
